name: Build & Release

on:
  push:
    tags:
      - 'v*'          # Se déclenche quand on pousse un tag comme v2.0.1
  workflow_dispatch:  # Permet aussi de lancer le build À LA MAIN depuis l'onglet Actions

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install   # 'install' (et non 'ci') : tolérant si package-lock.json n'est pas à jour

      - name: Build & Publish
        env:
          # Token PERSO (PAT) requis : le workflow tourne dans le repo du CODE mais publie
          # la release dans un AUTRE repo (HSKNinja/jeuxcracks_app_releases, public).
          # Le token automatique GITHUB_TOKEN ne peut PAS publier dans un autre repo.
          # → Crée un secret nommé GH_TOKEN dans ce repo (voir instructions).
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run publish
